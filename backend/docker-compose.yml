services:
  postgres:
    image: postgres:16-alpine
    container_name: gym-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gym
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gym"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrator:
    build:
      context: .
      dockerfile: ./deploy/Dockerfile.migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gym

  user-service:
    build:
      context: .
      dockerfile: ./deploy/Dockerfile.user-service
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gym
      USER_SERVICE_PORT: 8081
    ports:
      - "8081:8081"

  membership-service:
    build:
      context: .
      dockerfile: ./deploy/Dockerfile.membership-service
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gym
      MEMBERSHIP_SERVICE_PORT: 8082
    ports:
      - "8082:8082"

volumes:
  pg_data:
